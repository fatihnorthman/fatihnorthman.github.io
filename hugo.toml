baseURL = 'https://fatihnorthman.github.io/'
locale = 'tr-TR'
title = 'Fatih Şahan'
theme = 'terminal'
paginate = 8
removePathAccents = true
[outputs]
  home = ["HTML", "RSS", "Sitemap"]

[outputFormats.Sitemap]
  mediaType = "application/xml"
  baseName = "sitemap"
  isPlainText = true
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]



[permalinks]
  posts = "/:slug/"

[params]
  logoText = "~/ northman"
  contentTypeName = "posts"
  themeColor = "red"
  customCSS = ["css/custom.css"]
  showLastUpdated = false
  ReadMore = "Devamını Oku"
  minuteReadingTime = "dk okuma"
  words = "kelime"
  Toc = false
  TocTitle = "İçindekiler"
  github = "fatihnorthman"
  email = "sahanfatih2798@gmail.com"
  subtitle = "Infrastructure Architect & Linux Enthusiast"
  description = "Linux, altyapı mimarisi, siber güvenlik ve teknoloji üzerine derinlemesine rehberler ve teknik dökümanlar."

[languages]
  [languages.tr]
    title = "Fatih Şahan"
    subtitle = "Infrastructure Architect & Linux Enthusiast"
    [languages.tr.params]
      mainSections = ["posts"]
      description = "Linux, altyapı mimarisi, siber güvenlik ve teknoloji üzerine derinlemesine rehberler ve teknik dökümanlar."

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[minify]
  disableXML = true

[markup]
  [markup.highlight]
    noClasses = false
    style = "monokai"
    guessSyntax = true
    lineNos = false
    lineNumbersInTable = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      strikethrough = true
      table = true
      taskList = true
      typographer = true
      [markup.goldmark.extensions.footnote]
      [markup.goldmark.extensions.passthrough]
        enable = false
    [markup.goldmark.parser]
      autoHeadingID = true
      autoHeadingIDType = "github"
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[[menu.main]]
  name = "Ana Sayfa"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Hakkımda"
  url = "/about"
  weight = 3

[[menu.main]]
  name = "Etiketler"
  url = "/tags"
  weight = 4

[[menu.footer]]
  name = "Gizlilik Politikası"
  url = "/privacy-policy"
  weight = 1
