baseURL = 'https://fatihnorthman.github.io/'
locale = 'tr-TR'
title = 'Fatih Şahan'
theme = 'terminal'
paginate = 8
removePathAccents = true

[permalinks]
  posts = "/:title/"

[params]
  logoText = "~/ northman"
  contentTypeName = "posts"
  themeColor = "red"
  customCSS = ["css/custom.css"]
  showLastUpdated = false
  ReadMore = "Devamını Oku"
  minuteReadingTime = "dk okuma"
  words = "kelime"
  Toc = false
  TocTitle = "İçindekiler"
  github = "fatihnorthman"
  email = "sahanfatih2798@gmail.com"

[languages]
  [languages.tr]
    title = "Fatih Şahan"
    subtitle = "Infrastructure Architect & Linux Enthusiast"
    [languages.tr.params]
      mainSections = ["posts"]

[markup]
  [markup.highlight]
    noClasses = false
    style = "monokai"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[[menu.main]]
  name = "Ana Sayfa"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Hakkımda"
  url = "/about"
  weight = 3

[[menu.main]]
  name = "Etiketler"
  url = "/tags"
  weight = 4

[[menu.footer]]
  name = "Gizlilik Politikası"
  url = "/privacy-policy"
  weight = 1
