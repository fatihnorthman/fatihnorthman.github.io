<!DOCTYPE html>
<html lang="tr" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{POST_TITLE}}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    
    body { margin: 0; padding: 0; background-color: #0d0d17; font-family: 'Inter', sans-serif; color: #dcdce8; }
    table { border-collapse: collapse; }
    a { text-decoration: none; }
    
    @media screen and (max-width: 600px) {
      .container { padding: 40px 12px !important; }
      .post-card { padding: 24px !important; }
      .post-title { font-size: 1.55rem !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#0d0d17;">

  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#0d0d17;">
    <tr>
      <td align="center" class="container" style="padding: 60px 20px;">
        
        <!-- Post Card (Exact Site Theme) -->
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" 
               style="max-width: 620px; background-color: #121220; border: 1px solid rgba(255, 255, 255, 0.09); border-radius: 16px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);">
          
          <!-- Gradient Line -->
          <tr>
            <td style="background: linear-gradient(90deg, #e53935 0%, #ff6659 100%); height: 4px; padding: 0;"></td>
          </tr>

          <tr>
            <td class="post-card" style="padding: 36px 32px;">
              
              <!-- Header -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td width="48" style="vertical-align: top;">
                    <div style="width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(229, 57, 53, 0.3); background: rgba(229, 57, 53, 0.05); padding: 2px;">
                      <img src="https://fatihnorthman.github.io/logo.svg" alt="F" width="44" height="44" style="border-radius: 50%; display: block;">
                    </div>
                  </td>
                  <td style="padding-left: 14px; vertical-align: middle;">
                    <div style="color: #ffffff; font-weight: 700; font-size: 17px; line-height: 1.2;">Fatih Northman</div>
                    <div style="color: #8888a0; font-size: 13px; font-family: 'JetBrains Mono', monospace; margin-top: 2px;">@fatihnorthman</div>
                  </td>
                  <td align="right" style="vertical-align: middle;">
                    <div style="background: rgba(229, 57, 53, 0.12); border: 1px solid rgba(229, 57, 53, 0.3); border-radius: 100px; padding: 4px 14px; color: #e53935; font-size: 10px; font-weight: 700; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em;">
                      NEW_POST
                    </div>
                  </td>
                </tr>
              </table>

              <!-- Title -->
              <div style="margin-top: 28px;">
                <a href="{{POST_URL}}" style="color: #ffffff; text-decoration: none;">
                  <h2 class="post-title" style="margin: 0; font-size: 1.8rem; font-weight: 700; line-height: 1.35; color: #ffffff; letter-spacing: -0.02em;">
                    {{POST_TITLE}}
                  </h2>
                </a>
              </div>

              <!-- Date -->
              <div style="margin-top: 10px; color: #8888a0; font-size: 13px; font-family: 'JetBrains Mono', monospace;">
                {{POST_DATE}}
              </div>

              <!-- Content -->
              <div style="margin-top: 24px; color: #a8a8c0; font-size: 16px; line-height: 1.8;">
                {{POST_DESC}}
              </div>

              <!-- Tags -->
              <div style="margin-top: 28px; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #e53935;">
                {{POST_TAGS}}
              </div>

              <!-- Footer -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin-top: 36px; padding-top: 28px; border-top: 1px solid rgba(255, 255, 255, 0.05);">
                <tr>
                  <td>
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                      <tr>
                        <td style="background: rgba(255, 255, 255, 0.04); border-radius: 10px; padding: 10px 16px; color: #dcdce8; font-size: 13px; font-weight: 600;">
                          <span style="color: #e53935; margin-right: 6px;">❤</span> 0 <span style="color: #666680; font-weight: 400; font-size: 11px; margin-left: 4px;">BEĞENİ</span>
                        </td>
                        <td width="10"></td>
                        <td style="background: rgba(255, 255, 255, 0.04); border-radius: 10px; padding: 10px 16px; color: #dcdce8; font-size: 13px; font-weight: 600;">
                          <span style="margin-right: 6px;">💬</span> 0 <span style="color: #666680; font-weight: 400; font-size: 11px; margin-left: 4px;">YORUM</span>
                        </td>
                      </tr>
                    </table>
                  </td>
                  <td align="right">
                    <a href="{{POST_URL}}" style="display: inline-block; background: linear-gradient(135deg, #e53935 0%, #ff6659 100%); color: #ffffff; padding: 12px 28px; border-radius: 10px; font-weight: 700; font-size: 14px; text-decoration: none; box-shadow: 0 10px 20px rgba(229, 57, 53, 0.2);">
                      Yazıyı Oku →
                    </a>
                  </td>
                </tr>
              </table>

            </td>
          </tr>
        </table>

        <!-- Footer Branding -->
        <div style="margin-top: 40px; text-align: center;">
          <div style="font-family: 'JetBrains Mono', monospace; color: #e53935; font-size: 13px; font-weight: 700; margin-bottom: 12px; letter-spacing: 0.1em; opacity: 0.8;">
            NORTH PROTOCOL // ARCHITECT EDITION
          </div>
          <p style="color: #666680; font-size: 12px; margin: 0 0 12px;">
            Sitemize <a href="https://fatihnorthman.github.io" style="color: #a8a8c0; text-decoration: none;">fatihnorthman.github.io</a> üzerinden abone olduğunuz için bu maili aldınız.
          </p>
          <p style="color: #666680; font-size: 12px; margin: 0;">
            <a href="mailto:fatihnorthman.blog@gmail.com?subject=Unsubscribe" style="color: #e53935; text-decoration: none; font-weight: 600;">Abonelikten Ayrıl</a>
          </p>
        </div>

      </td>
    </tr>
  </table>

</body>
</html>
