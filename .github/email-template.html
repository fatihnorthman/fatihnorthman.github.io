<!DOCTYPE html>
<html lang="tr" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{POST_TITLE}}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    
    body { 
      margin: 0; 
      padding: 0; 
      background-color: #0d0d17; 
      font-family: 'Inter', -apple-system, sans-serif; 
      color: #dcdce8;
      /* Cyber Amber Glows */
      background-image: 
        radial-gradient(circle at 5% 10%, rgba(255, 102, 89, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 95% 90%, rgba(255, 193, 7, 0.05) 0%, transparent 40%);
    }
    table { border-collapse: collapse; }
    a { text-decoration: none; }
    
    .badge {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: #ffc107;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border: 1px solid #705816;
      background: rgba(255, 193, 7, 0.05);
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 24px;
    }
    
    .badge-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #ffc107;
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 8px #ffc107;
    }

    @media screen and (max-width: 600px) {
      .container { padding: 40px 14px !important; }
      .post-card-inner { padding: 24px !important; }
      .post-title { font-size: 1.5rem !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#0d0d17;">

  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#0d0d17;">
    <tr>
      <td align="center" class="container" style="padding: 60px 20px;">
        
        <!-- Architect Header -->
        <div style="text-align: center; margin-bottom: 50px;">
          <div class="badge">
            <span class="badge-dot"></span>Infrastructure Architect
          </div>
          <div style="margin-top: 10px;">
            <a href="https://fatihnorthman.github.io">
              <img src="https://fatihnorthman.github.io/logo.svg" alt="Logo" width="160" style="display: block; margin: 0 auto; filter: drop-shadow(0 0 15px rgba(255, 102, 89, 0.2));">
            </a>
          </div>
          <div style="margin-top: 15px; font-family: 'JetBrains Mono', monospace; font-size: 15px; color: #a8a8c0; font-style: italic; letter-spacing: 0.05em;">
            ~/ northman
          </div>
        </div>

        <!-- Post Card (Exact Site Style) -->
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" 
               style="max-width: 620px; background-color: #121220; border: 1px solid #352c1c; border-radius: 16px; overflow: hidden; box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);">
          
          <!-- Cyber Gradient Top Bar -->
          <tr>
            <td style="background: linear-gradient(90deg, #ff6659 0%, #ffc107 100%); height: 3px; padding: 0;"></td>
          </tr>

          <tr>
            <td class="post-card-inner" style="padding: 35px;">
              
              <!-- User Info -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td width="66" style="vertical-align: top;">
                    <div style="width: 64px; height: 64px; border-radius: 50%; border: 1px solid #705816; background: #0d0d17; overflow: hidden;">
                      <img src="https://fatihnorthman.github.io/logo.svg" alt="FN" width="64" height="64" style="border-radius: 50%; display: block;">
                    </div>
                  </td>
                  <td style="padding-left: 15px; vertical-align: middle;">
                    <div style="color: #ffffff; font-weight: 700; font-size: 17px; line-height: 1.2;">Fatih Northman</div>
                    <div style="color: #ffc107; font-size: 13px; font-family: 'JetBrains Mono', monospace; margin-top: 2px;">@fatihnorthman</div>
                  </td>
                </tr>
              </table>

              <!-- Post Title -->
              <div style="margin-top: 28px;">
                <a href="{{POST_URL}}" style="color: #ffffff; text-decoration: none;">
                  <h2 class="post-title" style="margin: 0; font-size: 1.85rem; font-weight: 700; line-height: 1.3; color: #ffffff; letter-spacing: -0.03em;">
                    {{POST_TITLE}}
                  </h2>
                </a>
              </div>

              <!-- Post Meta -->
              <div style="margin-top: 10px; color: #8888a0; font-size: 13px; font-family: 'JetBrains Mono', monospace;">
                📅 {{POST_DATE}}
              </div>

              <!-- Post Content -->
              <div style="margin-top: 22px; color: #a8a8c0; font-size: 16px; line-height: 1.8;">
                {{POST_DESC}}
              </div>

              <!-- Tags (Yellow) -->
              <div style="margin-top: 24px; font-family: 'JetBrains Mono', monospace; font-size: 14px;">
                {{POST_TAGS}}
              </div>

              <!-- Footer Stats & Button -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin-top: 40px; padding-top: 25px; border-top: 1px solid #1a1a2a;">
                <tr>
                  <td>
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                      <tr>
                        <td style="background: #1a1a2a; border: 1px solid #28241a; border-radius: 100px; padding: 7px 15px; color: #dcdce8; font-size: 12px; font-weight: 600;">
                          <span style="color: #ffc107;">❤</span> 0 <span style="color: #8888a0; font-size: 10px; margin-left: 4px;">BEĞENİ</span>
                        </td>
                        <td width="10"></td>
                        <td style="background: #1a1a2a; border: 1px solid #28241a; border-radius: 100px; padding: 7px 15px; color: #dcdce8; font-size: 12px; font-weight: 600;">
                          <span>💬</span> 0 <span style="color: #8888a0; font-size: 10px; margin-left: 4px;">YORUM</span>
                        </td>
                      </tr>
                    </table>
                  </td>
                  <td align="right">
                    <a href="{{POST_URL}}" style="display: inline-block; background: linear-gradient(135deg, #ff6659 0%, #ffc107 100%); color: #0d0d17; padding: 12px 28px; border-radius: 10px; font-weight: 800; font-size: 13px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; box-shadow: 0 10px 25px rgba(255, 193, 7, 0.25);">
                      Yazıyı Oku →
                    </a>
                  </td>
                </tr>
              </table>

            </td>
          </tr>
        </table>

        <!-- Branding -->
        <div style="margin-top: 60px; text-align: center;">
          <div style="font-family: 'JetBrains Mono', monospace; color: #ffc107; font-size: 13px; font-weight: 700; letter-spacing: 0.2em; margin-bottom: 16px;">
            NORTH PROTOCOL // ARCHITECT EDITION
          </div>
          <p style="color: #666680; font-size: 12px; margin: 0 0 10px;">
            Bültene <a href="https://fatihnorthman.github.io" style="color: #dcdce8; text-decoration: none;">fatihnorthman.github.io</a> üzerinden abone oldunuz.
          </p>
          <p style="color: #666680; font-size: 12px; margin: 0;">
            <a href="mailto:fatihnorthman.blog@gmail.com?subject=Unsubscribe" style="color: #ff6659; text-decoration: none; font-weight: 600;">Abonelikten Çık</a>
          </p>
        </div>

      </td>
    </tr>
  </table>

</body>
</html>
