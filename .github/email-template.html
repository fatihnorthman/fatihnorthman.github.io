<!DOCTYPE html>
<html lang="tr" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{POST_TITLE}}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    
    body { 
      margin: 0; 
      padding: 0; 
      background-color: #0d0d17; 
      font-family: 'Inter', -apple-system, sans-serif; 
      color: #dcdce8;
      /* Site's radial gradients */
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(229, 57, 53, 0.04) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(229, 57, 53, 0.04) 0%, transparent 40%);
      background-attachment: fixed;
    }
    table { border-collapse: collapse; }
    a { text-decoration: none; }
    
    @media screen and (max-width: 600px) {
      .container { padding: 40px 14px !important; }
      .post-card-inner { padding: 24px !important; }
      .post-title { font-size: 1.5rem !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#0d0d17;">

  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#0d0d17;">
    <tr>
      <td align="center" class="container" style="padding: 60px 20px;">
        
        <!-- Post Card (Exact Match to .post.on-list) -->
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" 
               style="max-width: 620px; background-color: #121220; border: 1px solid rgba(255, 255, 255, 0.09); border-radius: 16px; overflow: hidden; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);">
          
          <tr>
            <td class="post-card-inner" style="padding: 30px;">
              
              <!-- Post Header (Exact fn-avatar-frame) -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td width="66" style="vertical-align: top;">
                    <div style="width: 64px; height: 64px; border-radius: 50%; border: 1px solid rgba(229, 57, 53, 0.4); background: none; display: block; overflow: hidden;">
                      <img src="https://fatihnorthman.github.io/logo.svg" alt="Avatar" width="64" height="64" style="border-radius: 50%; display: block;">
                    </div>
                  </td>
                  <td style="padding-left: 12px; vertical-align: middle;">
                    <div style="color: #ffffff; font-weight: 700; font-size: 16px; line-height: 1.2;">Fatih Northman</div>
                    <div style="color: #e53935; font-size: 13px; font-family: 'JetBrains Mono', monospace; opacity: 0.8;">@fatihnorthman</div>
                  </td>
                </tr>
              </table>

              <!-- Post Title (Exact .post-title) -->
              <div style="margin-top: 24px;">
                <a href="{{POST_URL}}" style="color: #ffffff; text-decoration: none;">
                  <h2 class="post-title" style="margin: 0; font-size: 1.85rem; font-weight: 700; line-height: 1.25; color: #ffffff; letter-spacing: -0.025em;">
                    {{POST_TITLE}}
                  </h2>
                </a>
              </div>

              <!-- Post Meta (Exact .post-meta) -->
              <div style="margin-top: 10px; color: #8888a0; font-size: 13px; font-family: 'JetBrains Mono', monospace;">
                📅 {{POST_DATE}}
              </div>

              <!-- Post Content (Exact .post-content) -->
              <div style="margin-top: 20px; color: #a8a8c0; font-size: 16px; line-height: 1.8;">
                {{POST_DESC}}
              </div>

              <!-- Post Tags (Exact .post-tags-list) -->
              <div style="margin-top: 24px; font-family: 'JetBrains Mono', monospace; font-size: 14px;">
                {{POST_TAGS}}
              </div>

              <!-- Post Footer (Exact .post-footer) -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin-top: 32px; padding-top: 24px; border-top: 1px solid rgba(255, 255, 255, 0.05);">
                <tr>
                  <td>
                    <!-- Interaction Stats (Exact .stat-card) -->
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                      <tr>
                        <td style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 100px; padding: 6px 14px; color: #dcdce8; font-size: 12px;">
                          <span style="color: #e53935; font-weight: 700;">❤</span> 0 <span style="color: #666680; margin-left: 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;">BEĞENİ</span>
                        </td>
                        <td width="8"></td>
                        <td style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 100px; padding: 6px 14px; color: #dcdce8; font-size: 12px;">
                          <span style="font-weight: 700;">💬</span> 0 <span style="color: #666680; margin-left: 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;">YORUM</span>
                        </td>
                      </tr>
                    </table>
                  </td>
                  <td align="right">
                    <!-- Read More (Exact .read-more) -->
                    <a href="{{POST_URL}}" style="display: inline-block; background: transparent; border: 1px solid rgba(229, 57, 53, 0.3); color: #e53935; padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 13px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.04em;">
                      Yazıyı Oku →
                    </a>
                  </td>
                </tr>
              </table>

            </td>
          </tr>
        </table>

        <!-- Branding Footer -->
        <div style="margin-top: 40px; text-align: center;">
          <div style="font-family: 'JetBrains Mono', monospace; color: #e53935; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 12px;">
            NORTH PROTOCOL // ARCHITECT EDITION
          </div>
          <p style="color: #666680; font-size: 12px; margin: 0 0 10px;">
            <a href="https://fatihnorthman.github.io" style="color: #a8a8c0; text-decoration: none;">fatihnorthman.github.io</a> bültenine abone olduğunuz için bu maili aldınız.
          </p>
          <p style="color: #666680; font-size: 12px; margin: 0;">
            <a href="mailto:fatihnorthman.blog@gmail.com?subject=Unsubscribe" style="color: #e53935; text-decoration: none; font-weight: 600;">Abonelikten Çık</a>
          </p>
        </div>

      </td>
    </tr>
  </table>

</body>
</html>
