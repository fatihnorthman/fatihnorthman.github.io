<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{POST_TITLE}}</title>
</head>
<body style="margin:0;padding:0;background:#0d0d0d;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0d0d0d;padding:48px 20px;">
    <tr>
      <td align="center">
        <table width="100%" style="max-width:580px;">

          <!-- Header -->
          <tr>
            <td style="background:#e53935;border-radius:12px 12px 0 0;padding:14px 28px;">
              <p style="margin:0;font-size:12px;color:rgba(255,255,255,0.75);font-family:monospace;letter-spacing:0.05em;">
                ~/ northman · yeni yazı
              </p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background:#141414;padding:36px 32px 28px;border-left:1px solid #1f1f1f;border-right:1px solid #1f1f1f;">

              <!-- Başlık -->
              <h1 style="margin:0 0 14px;font-size:24px;font-weight:700;color:#ffffff;line-height:1.3;">
                {{POST_TITLE}}
              </h1>

              <!-- Açıklama -->
              <p style="margin:0 0 28px;font-size:15px;color:#9e9e9e;line-height:1.7;">
                {{POST_DESC}}
              </p>

              <!-- CTA Butonu -->
              <a href="{{POST_URL}}"
                 style="display:inline-block;padding:13px 28px;background:#e53935;color:#ffffff;
                        text-decoration:none;border-radius:8px;font-weight:700;font-size:15px;
                        letter-spacing:0.02em;">
                Yazıyı Oku →
              </a>

            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="background:#141414;padding:0 32px;border-left:1px solid #1f1f1f;border-right:1px solid #1f1f1f;">
              <hr style="border:none;border-top:1px solid #1f1f1f;margin:0;">
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#141414;border-radius:0 0 12px 12px;border:1px solid #1f1f1f;border-top:none;padding:20px 32px;">
              <p style="margin:0;font-size:12px;color:#424242;line-height:1.6;">
                Bu e-postayı <strong style="color:#616161;">fatihnorthman.github.io</strong> adresine 
                abone olduğun için alıyorsun.<br>
                Aboneliğini iptal etmek için 
                <a href="mailto:sahanfatih2798@gmail.com?subject=Abonelik%20iptali" 
                   style="color:#616161;">buraya tıkla</a>.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
