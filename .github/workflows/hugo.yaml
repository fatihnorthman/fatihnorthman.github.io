# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - main
      - master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.122.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo --minify

      - name: Generate Sitemap
        run: |
          python3 << 'PYEOF'
          import os, re, glob
          from datetime import datetime

          BASE_URL = "https://fatihnorthman.github.io"
          TR_MAP = {'ç':'c','Ç':'c','ğ':'g','Ğ':'g','ı':'i','İ':'i','ö':'o','Ö':'o','ş':'s','Ş':'s','ü':'u','Ü':'u'}

          def tr_slugify(text):
              for k, v in TR_MAP.items():
                  text = text.replace(k, v)
              text = text.lower()
              text = re.sub(r'[^a-z0-9\-]', '-', text)
              return re.sub(r'-+', '-', text).strip('-')

          def get_meta(content, key, default=""):
              pattern = r'^' + key + r'\s*[:=]\s*["\']?(.*?)["\']?\s*$'
              m = re.search(pattern, content, re.MULTILINE)
              return m.group(1).strip() if m else default

          urls = [{"loc": BASE_URL + "/", "lastmod": datetime.now().strftime("%Y-%m-%d"), "changefreq": "daily", "priority": "1.0"}]

          files = sorted(glob.glob("content/posts/*.md"))
          files = [f for f in files if "_index" not in f]

          for f in files:
              with open(f, "r", encoding="utf-8") as fh:
                  content = fh.read()
              if get_meta(content, "draft", "false").lower() == "true":
                  continue
              slug = get_meta(content, "slug") or tr_slugify(os.path.basename(f).replace(".md", ""))
              lastmod = get_meta(content, "lastmod") or get_meta(content, "date")
              if lastmod and "T" in lastmod:
                  lastmod = lastmod.split("T")[0]
              if not lastmod:
                  lastmod = datetime.now().strftime("%Y-%m-%d")
              urls.append({"loc": f"{BASE_URL}/{slug}/", "lastmod": lastmod, "changefreq": "weekly", "priority": "0.8"})

          urls.append({"loc": f"{BASE_URL}/about/", "lastmod": datetime.now().strftime("%Y-%m-%d"), "changefreq": "monthly", "priority": "0.5"})
          urls.append({"loc": f"{BASE_URL}/privacy-policy/", "lastmod": datetime.now().strftime("%Y-%m-%d"), "changefreq": "monthly", "priority": "0.3"})

          lines = ['<?xml version="1.0" encoding="UTF-8"?>', '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">']
          for u in urls:
              lines += [f"  <url>", f"    <loc>{u['loc']}</loc>", f"    <lastmod>{u['lastmod']}</lastmod>",
                        f"    <changefreq>{u['changefreq']}</changefreq>", f"    <priority>{u['priority']}</priority>", "  </url>"]
          lines.append("</urlset>")

          xml_content = "\n".join(lines) + "\n"
          with open("public/sitemap.xml", "w", encoding="utf-8", newline="\n") as f:
              f.write(xml_content)
          print(f"Sitemap yazildi: {len(urls)} URL, {len(xml_content)} byte")
          PYEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
