name: Notify Subscribers on New Post

on:
  push:
    branches: [main]
    paths:
      - 'content/posts/**.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for new posts
        id: check
        run: |
          NEW_POSTS=$(git diff --name-only HEAD~1 HEAD -- 'content/posts/*.md' | grep -v '_index.md' || true)
          echo "new_posts=$NEW_POSTS" >> $GITHUB_OUTPUT
          if [ -n "$NEW_POSTS" ]; then
            echo "has_new=true" >> $GITHUB_OUTPUT
            # İlk yeni postu al
            FIRST=$(echo "$NEW_POSTS" | head -1)
            echo "post_file=$FIRST" >> $GITHUB_OUTPUT
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract post metadata
        if: steps.check.outputs.has_new == 'true'
        id: meta
        run: |
          FILE="${{ steps.check.outputs.post_file }}"
          TITLE=$(grep '^title' "$FILE" | head -1 | sed 's/title = //;s/["\x27]//g' | xargs)
          DESC=$(grep '^description' "$FILE" | head -1 | sed 's/description = //;s/["\x27]//g' | xargs)
          SLUG=$(basename "$FILE" .md)
          URL="https://fatihnorthman.github.io/${SLUG}/"
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "desc=$DESC"   >> $GITHUB_OUTPUT
          echo "url=$URL"     >> $GITHUB_OUTPUT

      - name: Send emails to subscribers
        if: steps.check.outputs.has_new == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          POST_TITLE: ${{ steps.meta.outputs.title }}
          POST_DESC: ${{ steps.meta.outputs.desc }}
          POST_URL: ${{ steps.meta.outputs.url }}
        run: |
          echo "=== DEBUG ==="
          echo "Title: $POST_TITLE"
          echo "URL:   $POST_URL"

          # Abone listesini çek
          SUBSCRIBERS=$(curl -s \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            "${SUPABASE_URL}/rest/v1/subscribers?select=name,email")

          echo "Supabase yaniti: $SUBSCRIBERS"

          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, sys

          raw = os.popen('echo $SUBSCRIBERS 2>/dev/null').read().strip()

          # Supabase yaniti environment variable uzerinden al
          supabase_url = os.environ.get('SUPABASE_URL','')
          service_key  = os.environ.get('SUPABASE_SERVICE_KEY','')

          import urllib.request as req_lib
          r = req_lib.Request(
              f"{supabase_url}/rest/v1/subscribers?select=name,email",
              headers={
                  "apikey": service_key,
                  "Authorization": f"Bearer {service_key}"
              }
          )
          try:
              with req_lib.urlopen(r) as resp:
                  data = json.loads(resp.read().decode())
          except Exception as e:
              print(f"Supabase hatasi: {e}")
              sys.exit(1)

          print(f"Abone sayisi: {len(data)}")

          if not isinstance(data, list) or len(data) == 0:
              print("Abone yok veya gecersiz yanit:", data)
              sys.exit(0)

          api_key = os.environ['RESEND_API_KEY']
          title   = os.environ['POST_TITLE']
          desc    = os.environ['POST_DESC']
          url     = os.environ['POST_URL']

          with open('.github/email-template.html', 'r', encoding='utf-8') as f:
              tmpl = f.read()

          html = tmpl.replace('{{POST_TITLE}}', title) \
                     .replace('{{POST_DESC}}',  desc)  \
                     .replace('{{POST_URL}}',   url)

          sent = 0
          for sub in data:
              email = sub.get('email','')
              if not email:
                  continue
              payload = {
                  'from': 'Fatih Sahan <onboarding@resend.dev>',
                  'to': [email],
                  'subject': f'Yeni yazi: {title}',
                  'html': html
              }
              request = req_lib.Request(
                  'https://api.resend.com/emails',
                  data=json.dumps(payload).encode(),
                  headers={
                      'Authorization': f'Bearer {api_key}',
                      'Content-Type': 'application/json'
                  }
              )
              try:
                  with req_lib.urlopen(request) as resp:
                      result = json.loads(resp.read().decode())
                      print(f"Gonderildi -> {email} | id:{result.get('id','?')}")
                      sent += 1
              except req_lib.HTTPError as e:
                  err = e.read().decode()
                  print(f"HATA {e.code} -> {email}: {err}")
              except Exception as e:
                  print(f"HATA -> {email}: {e}")

          print(f"Sonuc: {sent}/{len(data)} mail gonderildi.")
          PYEOF
