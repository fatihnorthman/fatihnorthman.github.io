name: Notify Subscribers on New Post

on:
  push:
    paths:
      - 'content/posts/*.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Send Newsletter
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, urllib.request, smtplib, urllib.parse, subprocess
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          commit_msg = os.environ.get('COMMIT_MSG', '').lower()
          print(f"Commit mesajı: {commit_msg}")

          # Güncelleme commit'lerinde bildirim gönderme
          skip_keywords = ['update post', 'edit:', 'fix:', 'update:', 'guncel', 'system: delete']
          if any(kw in commit_msg for kw in skip_keywords):
              print(f"Güncelleme/silme commit'i, bildirim atlanıyor.")
              exit(0)

          # 1. Bu commit'te değişen/eklenen .md dosyasını bul (en güvenilir yöntem)
          try:
              result = subprocess.run(
                  ['git', 'diff', '--name-only', '--diff-filter=A', 'HEAD~1', 'HEAD'],
                  capture_output=True, text=True
              )
              changed_files = [f for f in result.stdout.strip().split('\n')
                              if f.startswith('content/posts/') and f.endswith('.md') and '_index' not in f]
              print(f"Bu commit'te eklenen dosyalar: {changed_files}")
          except Exception as e:
              print(f"Git diff hatası: {e}")
              changed_files = []

          # Eğer yeni dosya yoksa (sadece güncelleme), dur
          if not changed_files:
              print("Bu commit'te yeni post eklenmedi, bildirim atlanıyor.")
              exit(0)

          post_file = changed_files[0]
          print(f"Bülten için seçilen dosya: {post_file}")

          with open(post_file, 'r', encoding='utf-8') as f:
              content = f.read()

          # 2. Meta verileri çek
          def get_meta(key, default=""):
              m = re.search(rf'^{key}\s*[:=]\s*["\']?(.*?)["\']?\s*$', content, re.MULTILINE)
              return m.group(1).strip() if m else default

          title = get_meta("title", "Yeni Yazı")
          description = get_meta("description")
          date_str = get_meta("date", "2026-01-01").replace('"', '').replace("'", "").split('T')[0]
          slug = get_meta("slug")
          if not slug:
              slug = urllib.parse.quote(title.lower().replace(' ', '-'))

          tags_match = re.search(r'tags\s*[:=]\s*\[(.*?)\]', content, re.MULTILINE)
          tags = tags_match.group(1).replace('"', '').replace("'", "") if tags_match else ""

          url = f"https://fatihnorthman.github.io/{slug}/"
          print(f"Post URL: {url}")
          print(f"Title: {title}")

          # 3. Şablonu hazırla
          with open('.github/email-template.html', 'r', encoding='utf-8') as f:
              html = f.read()

          tag_html = "".join([f'<span style="color:#ffc107;margin-right:8px;">#{t.strip()}</span> ' for t in tags.split(',') if t.strip()])
          html = html.replace('{{POST_TITLE}}', title).replace('{{POST_DESC}}', description).replace('{{POST_DATE}}', date_str).replace('{{POST_TAGS}}', tag_html).replace('{{POST_URL}}', url)

          # 4. Aboneleri çek
          sb_url = os.environ.get('SUPABASE_URL', '').strip()
          sb_key = os.environ.get('SUPABASE_SERVICE_KEY', '').strip()

          if not sb_url or not sb_key:
              print("HATA: SUPABASE_URL veya SUPABASE_SERVICE_KEY secret tanımlı değil!")
              exit(1)

          print(f"Supabase URL: {sb_url[:30]}...")

          try:
              req = urllib.request.Request(
                  f"{sb_url}/rest/v1/subscribers?select=email",
                  headers={"apikey": sb_key, "Authorization": f"Bearer {sb_key}"}
              )
              with urllib.request.urlopen(req) as response:
                  subscribers = json.loads(response.read().decode())
              print(f"Toplam abone sayısı: {len(subscribers)}")
          except Exception as e:
              print(f"Supabase Hatası: {str(e)}")
              exit(1)

          if not subscribers:
              print("Veritabanında abone bulunamadı.")
              exit(0)

          # 5. Gmail SMTP üzerinden gönder
          gmail_user = os.environ.get('GMAIL_EMAIL', '').strip()
          gmail_pwd = os.environ.get('GMAIL_PASSWORD', '').strip()

          if not gmail_user or not gmail_pwd:
              print("HATA: GMAIL_EMAIL veya GMAIL_PASSWORD secret tanımlı değil!")
              exit(1)

          try:
              server = smtplib.SMTP_SSL('smtp.gmail.com', 465)
              server.login(gmail_user, gmail_pwd)
              sent = 0
              for sub in subscribers:
                  try:
                      msg = MIMEMultipart()
                      msg['From'] = f"Fatih Northman <{gmail_user}>"
                      msg['To'] = sub['email']
                      msg['Subject'] = f"Yeni Yazı: {title}"
                      msg.attach(MIMEText(html, 'html'))
                      server.send_message(msg)
                      sent += 1
                  except Exception as sub_err:
                      print(f"Gönderim hatası ({sub['email']}): {str(sub_err)}")

              server.quit()
              print(f"Bülten başarıyla {sent}/{len(subscribers)} kişiye gönderildi.")
          except Exception as smtp_err:
              print(f"SMTP Bağlantı Hatası: {str(smtp_err)}")
              exit(1)
          PYEOF
