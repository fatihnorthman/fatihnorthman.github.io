name: Notify Subscribers on New Post

on:
  push:
    branches: [main]
    paths:
      - 'content/posts/**.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for new posts
        id: check
        run: |
          NEW_POSTS=$(git diff --name-only HEAD~1 HEAD -- 'content/posts/*.md' | grep -v '_index.md' || true)
          echo "new_posts=$NEW_POSTS" >> $GITHUB_OUTPUT
          if [ -n "$NEW_POSTS" ]; then
            echo "has_new=true" >> $GITHUB_OUTPUT
            # İlk yeni postu al
            FIRST=$(echo "$NEW_POSTS" | head -1)
            echo "post_file=$FIRST" >> $GITHUB_OUTPUT
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract post metadata
        if: steps.check.outputs.has_new == 'true'
        id: meta
        run: |
          FILE="${{ steps.check.outputs.post_file }}"
          TITLE=$(grep '^title' "$FILE" | head -1 | sed 's/title = //;s/["\x27]//g' | xargs)
          DESC=$(grep '^description' "$FILE" | head -1 | sed 's/description = //;s/["\x27]//g' | xargs)
          SLUG=$(basename "$FILE" .md)
          URL="https://fatihnorthman.github.io/${SLUG}/"
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "desc=$DESC"   >> $GITHUB_OUTPUT
          echo "url=$URL"     >> $GITHUB_OUTPUT

      - name: Send emails to subscribers
        if: steps.check.outputs.has_new == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          POST_TITLE: ${{ steps.meta.outputs.title }}
          POST_DESC: ${{ steps.meta.outputs.desc }}
          POST_URL: ${{ steps.meta.outputs.url }}
        run: |
          # Abone listesini çek
          SUBSCRIBERS=$(curl -s "${SUPABASE_URL}/rest/v1/subscribers?select=name,email" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}")

          echo "Subscribers: $SUBSCRIBERS"

          # Her aboneye mail gönder
          echo "$SUBSCRIBERS" | python3 -c "
          import sys, json, urllib.request, urllib.error, os

          data = json.load(sys.stdin)
          if not data:
              print('No subscribers found.')
              sys.exit(0)

          api_key   = os.environ['RESEND_API_KEY']
          title     = os.environ['POST_TITLE']
          desc      = os.environ['POST_DESC']
          url       = os.environ['POST_URL']

          html_template = '''<!DOCTYPE html>
          <html lang=\"tr\">
          <head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">
          <title>{title}</title></head>
          <body style=\"margin:0;padding:0;background:#0d0d0d;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;\">
          <table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"background:#0d0d0d;padding:40px 20px;\">
          <tr><td align=\"center\">
          <table width=\"100%\" style=\"max-width:560px;background:#141414;border-radius:16px;border:1px solid #1f1f1f;overflow:hidden;\">
          <tr><td style=\"background:#e53935;padding:6px 24px;\"><p style=\"margin:0;font-size:12px;color:rgba(255,255,255,0.7);font-family:monospace;\">~/ northman — yeni yazı</p></td></tr>
          <tr><td style=\"padding:32px 32px 24px;\">
          <h1 style=\"margin:0 0 12px;font-size:22px;font-weight:700;color:#ffffff;line-height:1.3;\">{title}</h1>
          <p style=\"margin:0 0 24px;font-size:15px;color:#9e9e9e;line-height:1.6;\">{desc}</p>
          <a href=\"{url}\" style=\"display:inline-block;padding:12px 24px;background:#e53935;color:#ffffff;text-decoration:none;border-radius:8px;font-weight:600;font-size:15px;\">Yazıyı Oku →</a>
          </td></tr>
          <tr><td style=\"padding:20px 32px;border-top:1px solid #1f1f1f;\">
          <p style=\"margin:0;font-size:12px;color:#424242;\">fatihnorthman.github.io · <a href=\"{url}\" style=\"color:#616161;\">Abonelikten çık</a></p>
          </td></tr>
          </table>
          </td></tr>
          </table>
          </body></html>'''

          sent = 0
          for sub in data:
              name  = sub.get('name', 'Okuyucu')
              email = sub.get('email', '')
              if not email:
                  continue

              payload = {
                  'from': 'Fatih Şahan <onboarding@resend.dev>',
                  'to': [email],
                  'subject': f'Yeni yazı: {title}',
                  'html': html_template.format(title=title, desc=desc, url=url)
              }

              req = urllib.request.Request(
                  'https://api.resend.com/emails',
                  data=json.dumps(payload).encode(),
                  headers={
                      'Authorization': f'Bearer {api_key}',
                      'Content-Type': 'application/json'
                  }
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      print(f'Sent to {email}: {r.status}')
                      sent += 1
              except urllib.error.HTTPError as e:
                  print(f'Failed {email}: {e.code} {e.read().decode()}')

          print(f'Done. Sent {sent}/{len(data)} emails.')
          "
