name: Notify Subscribers on New Post

on:
  push:
    paths:
      - 'content/posts/*.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Send Newsletter
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, urllib.request, smtplib, urllib.parse, glob, time
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          # 1. En yeni dosyayı bul (İçerikteki 'date' alanına göre)
          files = glob.glob('content/posts/*.md')
          files = [f for f in files if '_index.md' not in f]
          if not files:
              print("Yazı bulunamadı.")
              exit(0)
          
          def extract_date(filepath):
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      c = f.read()
                      m = re.search(r'date\s*[:=]\s*["\']?(.*?)["\']?$', c, re.MULTILINE)
                      return m.group(1).strip() if m else "1970-01-01"
              except: return "1970-01-01"

          post_file = max(files, key=extract_date)
          print(f"Bülten için seçilen en yeni dosya: {post_file}")
          
          with open(post_file, 'r', encoding='utf-8') as f:
              content = f.read()

          # 2. Meta verileri çek (Esnek Regex)
          def get_meta(key, default=""):
              m = re.search(f'{key}\s*[:=]\s*["\']?(.*?)["\']?$', content, re.MULTILINE)
              return m.group(1).strip() if m else default

          title = get_meta("title", "Yeni Yazı")
          description = get_meta("description")
          date_str = get_meta("date", "2026-05-01").replace('"', '').replace("'", "").split('T')[0]
          slug = get_meta("slug")
          if not slug:
              slug = urllib.parse.quote(title.lower().replace(' ', '-'))
          
          tags_match = re.search(r'tags\s*[:=]\s*\[(.*?)\]', content, re.MULTILINE)
          tags = tags_match.group(1).replace('"', '').replace("'", "") if tags_match else ""

          url = f"https://fatihnorthman.github.io/{slug}/"

          # 3. Şablonu hazırla
          with open('.github/email-template.html', 'r', encoding='utf-8') as f:
              html = f.read()

          tag_html = "".join([f'<span style="color:#ffc107;margin-right:8px;">#{t.strip()}</span> ' for t in tags.split(',') if t.strip()])
          html = html.replace('{{POST_TITLE}}', title).replace('{{POST_DESC}}', description).replace('{{POST_DATE}}', date_str).replace('{{POST_TAGS}}', tag_html).replace('{{POST_URL}}', url)

          # 4. Aboneleri çek (En yalın haliyle)
          sb_url = 'https://xusjivptdjytbcobarxh.supabase.co'
          sb_key = os.environ.get('SUPABASE_SERVICE_KEY', '').strip()
          
          try:
              # Filtreyi kaldırıp sadece email çekiyoruz (Hata payını sıfıra indirmek için)
              req = urllib.request.Request(f"{sb_url}/rest/v1/subscribers?select=email", headers={"apikey": sb_key, "Authorization": f"Bearer {sb_key}"})
              with urllib.request.urlopen(req) as response:
                  subscribers = json.loads(response.read().decode())
          except Exception as e:
              print(f"Supabase Hatası: {str(e)}")
              # Hata olsa bile diğer işlemleri bozma veya manuel liste kullan
              subscribers = []

          if not subscribers:
              print("Gönderilecek abone bulunamadı.")
              exit(0)

          # 5. Gmail SMTP üzerinden gönder
          gmail_user = os.environ.get('GMAIL_EMAIL', '').strip()
          gmail_pwd = os.environ.get('GMAIL_PASSWORD', '').strip()
          
          try:
              server = smtplib.SMTP_SSL('smtp.gmail.com', 465)
              server.login(gmail_user, gmail_pwd)

              for sub in subscribers:
                  try:
                      msg = MIMEMultipart()
                      msg['From'] = f"Fatih Northman <{gmail_user}>"
                      msg['To'] = sub['email']
                      msg['Subject'] = f"Yeni Yazı: {title}"
                      msg.attach(MIMEText(html, 'html'))
                      server.send_message(msg)
                  except Exception as sub_err:
                      print(f"E-posta gönderim hatası ({sub['email']}): {str(sub_err)}")
              
              server.quit()
              print(f"Bülten başarıyla {len(subscribers)} kişiye gönderildi.")
          except Exception as smtp_err:
              print(f"SMTP Bağlantı Hatası: {str(smtp_err)}")
              exit(1)
          PYEOF
