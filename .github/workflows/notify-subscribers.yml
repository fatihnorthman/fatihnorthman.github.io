name: Notify Subscribers on New Post

on:
  push:
    branches: [main]
    paths:
      - 'content/posts/**.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for new posts
        id: check
        run: |
          NEW_POSTS=$(git diff --name-only --diff-filter=d HEAD~1 HEAD -- 'content/posts/*.md' | grep -v '_index.md' || true)
          echo "new_posts=$NEW_POSTS" >> $GITHUB_OUTPUT
          if [ -n "$NEW_POSTS" ]; then
            echo "has_new=true" >> $GITHUB_OUTPUT
            # İlk yeni postu al
            FIRST=$(echo "$NEW_POSTS" | head -1)
            echo "post_file=$FIRST" >> $GITHUB_OUTPUT
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract post metadata
        if: steps.check.outputs.has_new == 'true'
        id: meta
        run: |
          FILE="${{ steps.check.outputs.post_file }}"
          TITLE=$(grep '^title' "$FILE" | head -1 | sed 's/title = //;s/["\x27]//g' | xargs)
          DESC=$(grep '^description' "$FILE" | head -1 | sed 's/description = //;s/["\x27]//g' | xargs)
          DATE=$(grep '^date' "$FILE" | head -1 | sed 's/date = //;s/["\x27]//g' | cut -d'T' -f1 | xargs)
          TAGS=$(grep '^tags' "$FILE" | head -1 | sed 's/tags = //;s/[\[\]"\x27]//g' | sed 's/,/ /g' | xargs)
          SLUG=$(basename "$FILE" .md)
          URL="https://fatihnorthman.github.io/${SLUG}/"
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "desc=$DESC"   >> $GITHUB_OUTPUT
          echo "date=$DATE"   >> $GITHUB_OUTPUT
          echo "tags=$TAGS"   >> $GITHUB_OUTPUT
          echo "url=$URL"     >> $GITHUB_OUTPUT
      - name: Send emails to subscribers
        if: steps.check.outputs.has_new == 'true'
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          POST_FILE: ${{ steps.check.outputs.post_file }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os, sys, re, urllib.parse
          import smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          print("=== DEBUG BİLGİLERİ BAŞLANGICI ===")
          
          # URL'yi koda gömdük
          sb_url = 'https://xusjivptdjytbcobarxh.supabase.co'

          sb_key = os.environ.get('SUPABASE_SERVICE_KEY', '').strip()
          gmail_user = os.environ.get('GMAIL_EMAIL', '').strip()
          gmail_pwd  = os.environ.get('GMAIL_PASSWORD', '').strip()
          
          # Hugo uyumlu slugify fonksiyonu (Türkçe karakterleri KORUR)
          post_file = os.environ.get('POST_FILE', '')

          with open(post_file, 'r', encoding='utf-8') as f:
              content = f.read()

          # Front-matter'dan verileri daha sağlam çek (Regex ile)
          title_match = re.search(r'^title:\s*["\']?(.*?)["\']?$', content, re.MULTILINE)
          title = title_match.group(1) if title_match else "Yeni Yazı"
          
          desc_match = re.search(r'^description:\s*["\']?(.*?)["\']?$', content, re.MULTILINE)
          description = desc_match.group(1) if desc_match else ""
          
          date_match = re.search(r'^date:\s*(.*?)$', content, re.MULTILINE)
          date_str = date_match.group(1).split('T')[0] if date_match else "2026-05-01"
          
          tags_match = re.search(r'^tags:\s*\[(.*?)\]', content, re.MULTILINE)
          tags = tags_match.group(1).replace('"', '').replace("'", "") if tags_match else ""

          # Hugo uyumlu Slugify (Türkçe karakterleri KORUR)
          def hugo_slugify(text):
              # Python'ın lower()'ı 'İ'yi 'i̇' (iki karakter) yapar, Hugo ise 'i' yapar.
              text = text.replace('İ', 'i').replace('I', 'ı')
              text = text.lower().strip()
              # Boşlukları ve özel karakterleri temizle
              text = text.replace(':', '').replace(',', '').replace('.', '').replace('!', '').replace('?', '')
              # Boşlukları tire yap
              text = re.sub(r'\s+', '-', text)
              # Sadece harfler, rakamlar ve tireleri tut
              return text

          slug = hugo_slugify(title)
          url = f"https://fatihnorthman.github.io/{slug}/"

          # Etiketleri formatla
          tag_html = ""
          if tags:
              tag_list = [t.strip() for t in tags.split(',')]
              for t in tag_list:
                  tag_html += f'<span style="color:#ffc107;margin-right:8px;">#{t}</span> '

          debug_out = f"Title: {title}\nURL: {url}\nSlug: {slug}\n"
          
          if not sb_url or not sb_key:
              debug_out += "HATA: SUPABASE_URL veya SUPABASE_SERVICE_KEY eksik!\n"
              print(debug_out)
              sys.exit(1)
              
          if not gmail_user or not gmail_pwd:
              debug_out += "HATA: GMAIL_EMAIL veya GMAIL_PASSWORD eksik!\n"
              print(debug_out)
              sys.exit(1)

          # Supabase'den aboneleri çek
          req_url = f"{sb_url}/rest/v1/subscribers?select=name,email"
          debug_out += f"İstek atılıyor: {req_url}\n"
          
          req = urllib.request.Request(
              req_url,
              headers={
                  "apikey": sb_key,
                  "Authorization": f"Bearer {sb_key}"
              }
          )

          data = None
          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read().decode('utf-8'))
                  debug_out += f"Supabase Başarılı: {len(data)} kayıt döndü.\n"
          except urllib.error.HTTPError as e:
              debug_out += f"Supabase HTTP Hatası: {e.code} - {e.read().decode('utf-8')}\n"
          except Exception as e:
              debug_out += f"Supabase Bağlantı Hatası: {e}\n"

          if not data or not isinstance(data, list) or len(data) == 0:
              debug_out += "Abone bulunamadı veya geçersiz yanıt iptal ediliyor.\n"
              print(debug_out)
              sys.exit(0)

          # Şablonu oku
          try:
              with open('.github/email-template.html', 'r', encoding='utf-8') as f:
                  html = f.read()
          except Exception as e:
              debug_out += f"Şablon okuma hatası: {e}\n"
              print(debug_out)
              sys.exit(1)

          html = html.replace('{{POST_TITLE}}', title) \
                     .replace('{{POST_DESC}}',  description)  \
                     .replace('{{POST_DATE}}',  date_str)  \
                     .replace('{{POST_TAGS}}',  tag_html) \
                     .replace('{{POST_URL}}',   url)

          debug_out += "Gmail SMTP sunucusuna bağlanılıyor...\n"
          
          try:
              server = smtplib.SMTP_SSL('smtp.gmail.com', 465)
              server.login(gmail_user, gmail_pwd)
              debug_out += "Gmail bağlantısı başarılı!\n"
          except Exception as e:
              debug_out += f"Gmail giriş hatası: {e}\n"
              print(debug_out)
              sys.exit(1)

          # E-postaları gönder
          sent = 0
          for sub in data:
              email_addr = sub.get('email', '').strip()
              if not email_addr:
                  continue
              
              msg = MIMEMultipart('alternative')
              msg['Subject'] = f'Yeni yazi: {title}'
              msg['From'] = f"Fatih Northman <{gmail_user}>"
              msg['To'] = email_addr
              
              # --- Spam Filtresi İyileştirmeleri ---
              msg['List-Unsubscribe'] = f'<https://fatihnorthman.github.io/>'
              msg['Precedence'] = 'list'
              msg['X-Auto-Response-Suppress'] = 'OOF, AutoReply'
              # ------------------------------------

              part = MIMEText(html, 'html')
              msg.attach(part)
              
              try:
                  server.sendmail(gmail_user, email_addr, msg.as_string())
                  debug_out += f"Gönderildi -> {email_addr}\n"
                  sent += 1
              except Exception as e:
                  debug_out += f"SMTP Gönderim HATASI -> {email_addr}: {e}\n"

          try:
              server.quit()
          except:
              pass

          debug_out += f"--- İŞLEM TAMAM ---\n"
          debug_out += f"{sent}/{len(data)} kişiye başarıyla mail gönderildi.\n"
          
          print(debug_out)
          PYEOF
