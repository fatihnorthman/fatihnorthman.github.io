<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://*.githubusercontent.com https://api.github.com; connect-src https://api.github.com;">
    <title>North Protocol | Admin Console</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <div class="scanline"></div>
    <div class="admin-container">
        <!-- Login Overlay -->
        <div id="login-overlay" class="overlay">
            <div class="login-box">
                <div class="glitch-text" data-text="ACCESS RESTRICTED">ACCESS RESTRICTED</div>
                <p class="subtitle">GitHub Personal Access Token Gerekli</p>
                <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
                <div class="login-actions">
                    <button onclick="authAdmin()" class="btn-primary">Sisteme Bağlan</button>
                    <button onclick="toggleToken()" class="btn-sm">👁</button>
                </div>
                <a href="https://github.com/settings/tokens/new?scopes=repo&description=NorthProtocolAdmin" target="_blank" class="token-link">Token Nasıl Alınır?</a>
            </div>
        </div>

        <!-- Main Console -->
        <header class="console-header">
            <div class="logo">NORTH_PROTOCOL<span>v2.0</span></div>
            <div id="status" class="status">SİSTEM ÇEVRİMDIŞI</div>
        </header>

        <main class="console-main">
            <section class="editor-section">
                <div class="input-group">
                    <label>POST BAŞLIĞI</label>
                    <input type="text" id="post-title" placeholder="Örn: Linux Çekirdek Yapısı">
                </div>

                <div class="input-group">
                    <label>ETİKETLER (Virgülle ayırın)</label>
                    <input type="text" id="post-tags" placeholder="linux, kernel, tech">
                </div>

                <div class="input-group-row">
                    <div class="input-group">
                        <label>KATEGORİ</label>
                        <select id="post-category">
                            <option value="Yazılım">Yazılım</option>
                            <option value="Siber Güvenlik">Siber Güvenlik</option>
                            <option value="Donanım">Donanım</option>
                            <option value="Genel">Genel</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>SIRALAMA (Weight - Opsiyonel)</label>
                        <input type="number" id="post-weight" placeholder="Örn: 1 (En üst)">
                    </div>
                </div>

                <div class="input-group">
                    <label>AÇIKLAMA (SEO)</label>
                    <input type="text" id="post-desc" placeholder="Yazının kısa özeti...">
                </div>

                <div class="input-group">
                    <label>GÖRSEL SEÇ (Opsiyonel)</label>
                    <input type="file" id="post-image" accept="image/*" class="file-input">
                    <div id="image-preview" class="image-preview"></div>
                </div>

                <div class="input-group">
                    <label>İÇERİK (Markdown)</label>
                    <textarea id="post-content" placeholder="Protokol kurallarına uygun teknik içeriği buraya yazın..."></textarea>
                </div>

                <div class="actions">
                    <button onclick="publishPost()" id="publish-btn" class="btn-primary">PROTOKOLÜ YAYINLA</button>
                    <button onclick="logout()" class="btn-danger">ÇIKIŞ YAP</button>
                </div>
            </section>

            <aside class="sidebar-section">
                <div class="input-group">
                    <label>POST YÖNETİMİ</label>
                    <input type="text" id="post-search" placeholder="Yazı ara..." class="search-input" oninput="filterPosts()">
                    <div id="post-list" class="post-list">
                        <div class="loading-msg">Yazılar taranıyor...</div>
                    </div>
                </div>

                <div class="input-group">
                    <label>SİSTEM GÜNLÜĞÜ</label>
                    <div id="console-logs" class="logs">
                        > North Protocol Admin Console başlatıldı...
                        > Yetki bekleniyor...
                    </div>
                </div>
            </aside>
        </main>
    </div>
    <script src="admin.js"></script>
</body>
</html>
