<div class="post-interaction-hub">
    <!-- Beğeni Kartı -->
    <div class="interaction-card like-card">
        <button id="like-button" class="interaction-btn like-btn" data-post-id="{{ .RelPermalink }}">
            <span class="icon">❤</span>
            <div class="stats">
                <span class="count" id="like-count">0</span>
                <span class="label">Beğeni</span>
            </div>
        </button>
    </div>

    <!-- Paylaşım Kartı -->
    <div class="interaction-card share-card">
        <span class="card-title">Yazıyı Paylaş & PDF</span>
        <div class="share-grid">
            <a href="https://api.whatsapp.com/send?text={{ .Title }} {{ .Permalink }}" target="_blank" rel="noopener" class="share-item wa" title="WhatsApp">
                <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.94 3.659 1.437 5.63 1.438h.008c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
            </a>
            <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ .Permalink }}" target="_blank" rel="noopener" class="share-item in" title="LinkedIn">
                <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z"/></svg>
            </a>
            <a href="https://twitter.com/intent/tweet?text={{ .Title }}&url={{ .Permalink }}" target="_blank" rel="noopener" class="share-item tw" title="X">
                <svg viewBox="0 0 24 24"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z"/></svg>
            </a>
            <button id="download-pdf" class="share-item pdf" title="PDF Olarak İndir">
                <svg viewBox="0 0 24 24"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .8-.7 1.5-1.5 1.5H9v2H7.5V7H10c.8 0 1.5.7 1.5 1.5v1zm5 2c0 .8-.7 1.5-1.5 1.5h-2.5V7H15c.8 0 1.5.7 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9.5h1v-1H9v1zM14 11h1v-2.5h-1V11zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6z"/></svg>
                <span class="label">PDF İndir</span>
            </button>
            <button onclick="copyToClipboard()" class="share-item copy" title="Bağlantıyı Kopyala">
                <svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
            </button>
    </div>
</div>

<div id="comments-section" class="comments-section">


    <h3 class="comments-title">Yorumlar</h3>
    
    <div id="comments-list" class="comments-list">
        <div class="comment-card">
            <div class="comment-header">
                <div class="comment-avatar">AN</div>
                <div class="comment-info">
                    <span class="comment-author">Anonim Okuyucu</span>
                    <span class="comment-date">Yeni</span>
                </div>
            </div>
            <div class="comment-body">
                Henüz yorum yapılmamış. İlk yorumu siz yapın!
            </div>
        </div>
    </div>

    <div class="comment-form-container">
        <h4 class="form-title">Düşüncelerini Paylaş</h4>
        <form id="comment-form" class="comment-form">
            <input type="text" id="comment-name" placeholder="İsminiz" required>
            <textarea id="comment-text" placeholder="Yorumunuzu buraya yazın..." required></textarea>
            <button type="submit" class="submit-comment">Gönder Yorum Yap</button>
        </form>
    </div>
</div>

<script>
function copyToClipboard() {
    const cleanUrl = decodeURIComponent(window.location.href);
    navigator.clipboard.writeText(cleanUrl);
    const btn = document.querySelector('.share-item.copy');
    if (btn) {
        btn.style.borderColor = '#e53935';
        setTimeout(() => { btn.style.borderColor = ''; }, 2000);
    }
    alert('Bağlantı kopyalandı!');
}

// Paylaşım linklerini temiz URL ile güncelle
document.addEventListener('DOMContentLoaded', function() {
    const cleanUrl = decodeURIComponent(window.location.href);
    const title = encodeURIComponent(document.title);
    const wa = document.querySelector('.share-item.wa');
    const li = document.querySelector('.share-item.in');
    const tw = document.querySelector('.share-item.tw');
    if (wa) wa.href = `https://api.whatsapp.com/send?text=${title}%20${cleanUrl}`;
    if (li) li.href = `https://www.linkedin.com/sharing/share-offsite/?url=${cleanUrl}`;
    if (tw) tw.href = `https://twitter.com/intent/tweet?text=${title}&url=${cleanUrl}`;
});
</script>
