<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1926124607497508" crossorigin="anonymous"></script>
<meta name="google-adsense-account" content="ca-pub-1926124607497508">
<meta name="google-site-verification" content="62rcSt8D92e068Tvtq2zzqlG5rbYh_Vd6LBDCC4iHFQ" />

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Optimized CSP for AdSense Review -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.googlesyndication.com https://*.google.com https://*.googletagservices.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; frame-src 'self' https://*.doubleclick.net https://*.googlesyndication.com https://*.google.com;">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="no-referrer-when-downgrade">

<meta name="robots" content="index, follow">
<meta name="author" content="Fatih Şahan">
<meta name="publisher" content="North Protocol Architect">
<link rel="author" href="https://fatihnorthman.github.io/about">
<meta name="description" content="{{ with .Description }}{{ . }}{{ else if .IsPage }}{{ .Summary }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta name="keywords" content="linux, infrastructure, architect, siber güvenlik, yazılım, teknoloji, rehber">

<link rel="canonical" href="{{ .Permalink }}" />

{{- /* Theme CSS Assets (Orijinal Mantık) */ -}}
{{ $css := resources.Match "css/*.css" }}
{{ range $css }}
  {{ $styles := . | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $styles.Permalink }}">
{{ end }}

{{- /* Open Graph / Facebook */ -}}
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ if .IsPage }}{{ .Summary }}{{ else }}{{ .Site.Params.subtitle }}{{ end }}{{ end }}">
<meta property="og:image" content="{{ if .Params.image }}{{ .Site.BaseURL }}{{ .Params.image | strings.TrimPrefix "/" }}{{ else }}{{ .Site.BaseURL }}logo.png{{ end }}">

{{- /* Twitter Cards */ -}}
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ if .IsPage }}{{ .Summary }}{{ else }}{{ .Site.Params.subtitle }}{{ end }}{{ end }}">
<meta name="twitter:image" content="{{ if .Params.image }}{{ .Site.BaseURL }}{{ .Params.image | strings.TrimPrefix "/" }}{{ else }}{{ .Site.BaseURL }}logo.png{{ end }}">

{{- /* Font Preconnect */ -}}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

{{- /* JSON-LD Structured Data */ -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "{{ if .IsPage }}BlogPosting{{ else }}WebSite{{ end }}",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  "headline": "{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}",
  "description": "{{ with .Description }}{{ . }}{{ else }}{{ if .IsPage }}{{ .Summary }}{{ else }}{{ .Site.Params.subtitle }}{{ end }}{{ end }}",
  "image": "{{ .Site.BaseURL }}logo.png",
  "author": {
    "@type": "Person",
    "name": "{{ .Site.Title }}",
    "url": "{{ .Site.BaseURL }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "{{ .Site.Title }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ .Site.BaseURL }}logo.png"
    }
  },
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  "dateModified": "{{ if .Lastmod }}{{ .Lastmod.Format "2006-01-02" }}{{ else }}{{ .Date.Format "2006-01-02" }}{{ end }}",
  "mainEntity": {
    "@type": "Person",
    "name": "Fatih Şahan",
    "jobTitle": "Infrastructure Architect",
    "url": "https://fatihnorthman.github.io/about",
    "sameAs": [
      "https://github.com/fatihnorthman",
      "https://www.linkedin.com/in/fatih-sahan"
    ]
  }
}
</script>

<link rel="shortcut icon" href="/logo.svg">
