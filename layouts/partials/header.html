<header class="header">
  <div class="header__inner">
    <div class="header__logo">
      {{ partial "logo.html" . }}
    </div>

    <!-- 🌐 Dil Değiştirici -->
    <div class="lang-switcher" id="lang-switcher">
      <button class="lang-btn active" id="lang-tr" onclick="setLang('tr')" aria-label="Türkçe">
        <span class="lang-flag">🇹🇷</span>
        <span class="lang-code">TR</span>
      </button>
      <span class="lang-divider">|</span>
      <button class="lang-btn" id="lang-en" onclick="setLang('en')" aria-label="English">
        <span class="lang-flag">🇬🇧</span>
        <span class="lang-code">EN</span>
      </button>
    </div>

    {{ if len $.Site.Menus }}
      {{ partial "mobile-menu.html" . }}
    {{ end }}
    {{ if and $.Site.Params.showLanguageSelector (len $.Site.Home.AllTranslations) }}
      {{ partial "language-menu.html" . }}
    {{ end }}
  </div>
  {{ if len $.Site.Menus }}
    {{ partial "menu.html" . }}
  {{ end }}
</header>

<!-- Google Translate Element (gizli) -->
<div id="google_translate_element" style="display:none;"></div>

<!-- html2pdf.js lazy load via interactions.js -->

<!-- Reading Progress Bar -->
<div class="progress-container"><div class="progress-bar"></div></div>
